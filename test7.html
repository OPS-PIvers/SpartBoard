<!DOCTYPE html>
<html>
<head>
<style>
  .widget {
    width: 600px;
    height: 100px;
    border: 1px solid black;
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;
    align-items: stretch;
    gap: 8px;
    padding: 8px;
    resize: both;
    overflow: hidden;
  }
  .token {
    /* If we use flex-grow 1 and flex-basis auto or 0, it fills space */
    flex: 1 1 auto;
    border: 1px solid blue;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  /* CSS text scaling hack: we can use container-type size on token, and font-size based on cqh/cqw, but what if word length varies? We can use svg! */
  .token svg {
    width: 90%; /* leave a little padding */
    height: 80%;
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="token">
      <svg viewBox="0 0 50 20" preserveAspectRatio="xMidYMid meet">
        <text x="25" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Hello</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 50 20" preserveAspectRatio="xMidYMid meet">
        <text x="25" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">World</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet">
        <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">This</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 20 20" preserveAspectRatio="xMidYMid meet">
        <text x="10" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Is</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 15 20" preserveAspectRatio="xMidYMid meet">
        <text x="7.5" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">A</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet">
        <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Test</text>
      </svg>
    </div>
  </div>
</body>
</html>
