name: Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        # Immutable version pin (was the floating @v6 tag) for supply-chain
        # hygiene, matching the action-hosting-deploy pin below.
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: pnpm run test:all
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'test-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'test.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'test-project' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'test.appspot.com' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abc123' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || 'test-key' }}
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY || 'test-key' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || 'test-client-id' }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY || 'test-key' }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID || 'test-client-id' }}

      - name: Run type check
        run: pnpm run type-check:all

      - name: Run linter
        # `pnpm run lint` runs two SEPARATE type-aware ESLint passes in their
        # own processes: the root app (root tsconfig) and functions/ (functions
        # tsconfig). Splitting them means peak heap is bounded by the larger
        # single TS program (the app, ~4.5GB measured) instead of both programs
        # held in one process (which previously needed a 6144MB cap). 5120MB
        # leaves comfortable headroom above the measured peak. Rule coverage is
        # unchanged — see eslint.config.js and functions/eslint.config.mjs.
        run: NODE_OPTIONS=--max-old-space-size=5120 pnpm run lint

      - name: Check code formatting
        run: pnpm run format:check

      - name: Create .env file for Vite and Firebase
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env
          echo "VITE_OPENWEATHER_API_KEY=${{ secrets.VITE_OPENWEATHER_API_KEY }}" >> .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env
          echo "VITE_PEXELS_API_KEY=${{ secrets.VITE_PEXELS_API_KEY }}" >> .env
          echo "VITE_SPOTIFY_CLIENT_ID=${{ secrets.VITE_SPOTIFY_CLIENT_ID }}" >> .env

      - name: Build project
        run: pnpm run build:all

      # Deploy backend (rules, indexes, functions, storage) BEFORE hosting.
      # Reason: a new Firestore composite index isn't usable until it
      # finishes building, but `firebase deploy --only firestore` returns
      # success as soon as the build is queued. If hosting went first, a
      # query in the new client bundle that needs a not-yet-built index
      # would fail with FAILED_PRECONDITION the moment a teacher hit the
      # code path. Order: backend first, wait for indexes, hosting last.
      - name: Create Service Account File
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      # Wrapped in a retry helper: `firebase deploy` occasionally hits a
      # transient Google API blip (e.g. an HTTP 503 on the Firestore
      # field/index reconciliation read) that fails the whole deploy even
      # though the code is fine. The script retries those transient
      # signatures with exponential backoff and fails fast on real errors.
      - name: Deploy Firebase Rules, Indexes, Functions, Storage
        run: ./.github/scripts/firebase-deploy-with-retry.sh spartboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./service-account.json

      - name: Wait for Firestore composite indexes to be READY
        run: ./.github/scripts/wait-for-firestore-indexes.sh spartboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./service-account.json

      - name: Deploy to Firebase Hosting (Live)
        # CLI deploy via the repo's firebase-tools (15.22.3) instead of
        # FirebaseExtended/action-hosting-deploy@v0.10.0, whose OWN bundled
        # (older) firebase-tools hits "premature close" on googleapis
        # token/cloudfunctions calls under the current GitHub runner image —
        # the same root cause that broke the 15.8.0 backend deploy. The build
        # already ran above; `firebase deploy --only hosting` re-runs the
        # build:all predeploy hook and releases to the live channel.
        # Idempotent: when the built bundle is byte-identical to the current
        # live version, firebase rejects the re-release with 400 "is the current
        # active version". That's a no-op success (backend/workflow/docs-only
        # deploys don't change dist), so treat it as such; any other error still
        # fails the deploy.
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
        run: |
          set +e
          OUT=$(pnpm exec firebase deploy --only hosting --project spartboard 2>&1)
          CODE=$?
          echo "$OUT"
          if [ "$CODE" -ne 0 ]; then
            if echo "$OUT" | grep -q "is the current active version"; then
              echo "::notice::Hosting bundle unchanged — already live; nothing to release."
              exit 0
            fi
            exit "$CODE"
          fi

      - name: Cleanup Service Account File
        if: always()
        run: rm -f service-account.json

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🚀 Production Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: https://spartboard.web.app" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
