name: Deploy Dev Branches to Firebase Preview

on:
  push:
    branches:
      - 'dev-*'
  workflow_dispatch:

# Cancel a superseded preview deploy when a newer commit is pushed to the same
# branch, so rapid successive pushes don't each run a full 4-job deploy to
# completion. (workflow_dispatch is kept so a preview can also be re-run manually
# from the Actions tab.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      # `pnpm run lint` runs two SEPARATE type-aware ESLint passes in their own
      # processes (root app + functions/), so peak heap is bounded by the larger
      # single TS program (the app, ~4.5GB measured) instead of both programs in
      # one process (which previously needed a 6144MB cap). 5120MB leaves
      # headroom; rule coverage is unchanged (eslint.config.js + functions config).
      - run: NODE_OPTIONS=--max-old-space-size=5120 pnpm run lint
      - run: pnpm run format:check

  type-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run type-check:all

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run test:all
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}

  deploy:
    needs: [lint, type-check, test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Create .env file for Vite and Firebase
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env
          echo "VITE_OPENWEATHER_API_KEY=${{ secrets.VITE_OPENWEATHER_API_KEY }}" >> .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env
          echo "VITE_PEXELS_API_KEY=${{ secrets.VITE_PEXELS_API_KEY }}" >> .env
          echo "VITE_SPOTIFY_CLIENT_ID=${{ secrets.VITE_SPOTIFY_CLIENT_ID }}" >> .env

      - name: Build project
        run: pnpm run build:all

      - name: Extract branch name
        id: extract_branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Create Service Account File
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Deploy Firebase Rules, Indexes, Functions, Storage
        run: pnpm exec firebase deploy --only functions,firestore,storage --project spartboard --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./service-account.json

      # `firebase deploy --only firestore` returns once index creation is
      # queued, not when the build is ready. Wait here so the preview
      # channel's client bundle can't run a query before its index is
      # built — matches the production workflow's safety order.
      - name: Wait for Firestore composite indexes to be READY
        run: ./.github/scripts/wait-for-firestore-indexes.sh spartboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./service-account.json

      - name: Deploy to Firebase Preview Channel
        id: deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
        run: |
          # --json removed: firebase-tools 15.22.3 fails hosting:channel:deploy
          # under --json in CI (the human-readable deploy succeeds). `tee` keeps
          # the deploy output in the log, and the GH default shell's pipefail
          # still fails this step if the deploy errors. The Channel URL is parsed
          # from the normal output for the summary comment.
          pnpm exec firebase hosting:channel:deploy ${{ steps.extract_branch.outputs.branch }} --expires 30d --project spartboard 2>&1 | tee channel-deploy.log
          URL=$(grep -i 'Channel URL' channel-deploy.log | grep -oE 'https://[^ ]+\.web\.app' | head -n 1)
          echo "details_url=$URL" >> $GITHUB_OUTPUT
          rm -f channel-deploy.log

      - name: Cleanup Service Account File
        if: always()
        run: rm -f service-account.json

      - name: Comment deployment URL
        run: |
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ steps.deploy.outputs.details_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.extract_branch.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This preview will be available for 30 days and updates with each push to this branch." >> $GITHUB_STEP_SUMMARY
