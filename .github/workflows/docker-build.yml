name: Docker Build Validation

on:
  pull_request:
    branches:
      - main
      - dev-*
    # The Dockerfile does `COPY . . && pnpm run build`, so in principle any
    # source change affects the image — but PR Validation's `build` job already
    # runs `build:all` on every PR. This validation's unique job is catching
    # Docker/nginx/install breakage, so only run it when the build *plumbing*
    # changes. (No `push: main` trigger: the PR into main already validated it,
    # and this job only validates — it never publishes the image.)
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'nginx.conf'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - '.github/workflows/docker-build.yml'

# Supersede an in-flight build when a newer commit lands on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    name: Build Docker Image
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY || 'dummy' }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'dummy' }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID || 'dummy' }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'dummy' }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || 'dummy' }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID || 'dummy' }}
            VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY || 'dummy' }}
            VITE_OPENWEATHER_API_KEY=${{ secrets.VITE_OPENWEATHER_API_KEY || 'dummy' }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID || 'dummy' }}
            VITE_SPOTIFY_CLIENT_ID=${{ secrets.VITE_SPOTIFY_CLIENT_ID || 'dummy' }}
