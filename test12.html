<!DOCTYPE html>
<html>
<head>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;
    align-items: stretch;
    gap: 8px;
    padding: 8px;
    resize: both;
    overflow: hidden;
  }
  .token {
    flex: 1 1 auto;

    border: 1px solid blue;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;

    container-type: size;
    min-width: 0;
    min-height: 0;
  }
  .token-text {
    /*
      The goal is to scale the text to fill the parent token optimally.
      Because we can't reliably know the exact width of characters, an approximation works okay.
      Let's use the svg trick which is exactly what fits to a viewbox.
    */
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="token">
      <svg viewBox="0 0 50 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="25" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Hello</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 50 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="25" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">World</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">This</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 20 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="10" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Is</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 15 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="7.5" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">A</text>
      </svg>
    </div>
    <div class="token">
      <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
        <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Test</text>
      </svg>
    </div>
  </div>
</body>
</html>
