<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    container-type: size;
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="w-full h-full flex flex-wrap content-stretch items-stretch justify-center" style="gap: 2cqmin; padding: 2cqmin;">

      <!-- We can just use the previous CSS variable trick as it's cleaner in React without needing exact text measurement -->
      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 5;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">Hello</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 5;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">World</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 4;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">This</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 2;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">Is</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 1;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">A</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 4;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw;">Test</span>
      </button>
    </div>
  </div>
</body>
</html>
