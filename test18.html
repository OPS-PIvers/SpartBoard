<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    container-type: size;
  }
</style>
</head>
<body>
  <div class="widget">
    <!-- flex-wrap content-stretch items-stretch -->
    <div class="w-full h-full flex flex-wrap content-stretch items-stretch justify-center" style="gap: 2cqmin; padding: 2cqmin;">

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin; --char-count: 5;">
        <span style="font-size: min(70cqh, calc(100cqw / max(1, var(--char-count)) * 1.5)); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">Hello</span>
      </button>

      <!-- Instead of using inline span scaling, use SVG scaling which is perfect -->
      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <svg viewBox="0 0 100 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
          <text x="50" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">World</text>
        </svg>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <!-- we have to know viewBox width for each text, which is roughly char_count * 10 -->
        <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
          <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">This</text>
        </svg>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <svg viewBox="0 0 20 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
          <text x="10" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Is</text>
        </svg>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <svg viewBox="0 0 10 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
          <text x="5" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">A</text>
        </svg>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <svg viewBox="0 0 40 20" preserveAspectRatio="xMidYMid meet" width="90%" height="80%">
          <text x="20" y="15" text-anchor="middle" font-size="15" font-family="sans-serif">Test</text>
        </svg>
      </button>

    </div>
  </div>
</body>
</html>
