<!DOCTYPE html>
<html>
<head>
<style>
  .widget {
    width: 600px;
    height: 100px;
    border: 1px solid black;
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;
    align-items: stretch;
    gap: 8px;
    padding: 8px;
    resize: both;
    overflow: hidden;
  }
  .token {
    container-type: size;
    flex: 0 1 auto;
    border: 1px solid blue;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .token-text {
    font-size: 80cqh; /* 80% of token's height */
    line-height: 1;
    padding: 0 0.2em; /* little horizontal padding relative to font size */
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="token"><div class="token-text">Hello</div></div>
    <div class="token"><div class="token-text">World</div></div>
    <div class="token"><div class="token-text">This</div></div>
    <div class="token"><div class="token-text">Is</div></div>
    <div class="token"><div class="token-text">A</div></div>
    <div class="token"><div class="token-text">Test</div></div>
  </div>
</body>
</html>
