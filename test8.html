<!DOCTYPE html>
<html>
<head>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;
    align-items: stretch;
    gap: 8px;
    padding: 8px;
    resize: both;
    overflow: hidden;
  }
  .token {
    flex: 1 1 auto;
    border: 1px solid blue;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px; /* small padding */
    container-type: size;
    min-width: 0;
    min-height: 0;
  }
  .token-text {
    /*
      100cqh means 100% of container height.
      If a word is 5 characters, we might want max width to be ~ 20cqw per char.
    */
    font-size: min(80cqh, calc(180cqw / var(--char-count)));
    line-height: 1;
    white-space: pre;
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="token" style="--char-count: 5"><div class="token-text">Hello</div></div>
    <div class="token" style="--char-count: 5"><div class="token-text">World</div></div>
    <div class="token" style="--char-count: 4"><div class="token-text">This</div></div>
    <div class="token" style="--char-count: 2"><div class="token-text">Is</div></div>
    <div class="token" style="--char-count: 1"><div class="token-text">A</div></div>
    <div class="token" style="--char-count: 4"><div class="token-text">Test</div></div>
    <div class="token" style="--char-count: 14"><div class="token-text">LongerWordHere</div></div>
  </div>
</body>
</html>
