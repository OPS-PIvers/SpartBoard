<!DOCTYPE html>
<html>
<head>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;
    align-items: stretch;
    gap: 8px;
    padding: 8px;
    resize: both;
    overflow: hidden;
  }
  .token {
    /* To share space on the row equitably based on text length */
    flex: 1 1 auto;

    border: 1px solid blue;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;

    /* VERY IMPORTANT for dynamic scaling relative to container! */
    container-type: size;
    min-width: 0; /* allows shrinking */
  }
  .token-text {
    /*
      1. We want it to be as tall as the container lets it (say 80% of height) -> 80cqh.
      2. BUT it shouldn't be too wide. A character is roughly 0.6em wide.
         If it's N characters, its width is N * 0.6em.
         If we limit the width to 90% of the container width -> 90cqw.
         So max font-size based on width = 90cqw / (N * 0.6) = 150cqw / N.
         Let's use a slightly more conservative factor for wide chars, say N * 0.7 => 130cqw / N
         Or even 100cqw / (N * 0.65) ~ 150cqw / N. Let's just parameterize it inline.
    */
    font-size: min(80cqh, calc(100cqw / var(--char-count) * 1.5));
    line-height: 1;
    white-space: pre;
    padding: 0 5%; /* relative to its size */
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="token" style="--char-count: 5"><div class="token-text">Hello</div></div>
    <div class="token" style="--char-count: 5"><div class="token-text">World</div></div>
    <div class="token" style="--char-count: 4"><div class="token-text">This</div></div>
    <div class="token" style="--char-count: 2"><div class="token-text">Is</div></div>
    <div class="token" style="--char-count: 1"><div class="token-text">A</div></div>
    <div class="token" style="--char-count: 4"><div class="token-text">Test</div></div>
    <div class="token" style="--char-count: 14"><div class="token-text">LongerWordHere</div></div>
  </div>
</body>
</html>
