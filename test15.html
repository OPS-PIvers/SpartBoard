<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    container-type: size;
  }
</style>
</head>
<body>
  <div class="widget">
    <!-- Container -->
    <!-- Notice flex-wrap, content-stretch, items-stretch, and gap relative to widget size -->
    <div class="w-full h-full flex flex-wrap content-stretch items-stretch justify-center" style="gap: 2cqmin; padding: 2cqmin;">

      <!-- Token -->
      <!-- container-type: size on the token is needed so we can scale text relative to its width/height -->
      <!-- flex: 1 1 auto makes it fill the available space proportionally. -->
      <!-- min-width: 0; min-height: 0 ensures it can shrink below content size if needed. -->

      <!-- padding on token container? let's do small padding -->

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <!-- text size formula: min( 80cqh, (120cqw / N) ) where N is char count.
             Wait, if the text is masked "_ _ _" the length changes or it's just characters?
             If we pad the span 0 2cqw we keep text off the edge. -->
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 5))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">Hello</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 5))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">World</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 4))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">This</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 2))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">Is</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 1))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">A</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 1.5cqmin;">
        <span style="font-size: min(70cqh, calc(130cqw / max(1, 4))); line-height: 1; white-space: pre; padding: 0 5cqw; overflow: hidden; text-overflow: clip;">Test</span>
      </button>

    </div>
  </div>
</body>
</html>
