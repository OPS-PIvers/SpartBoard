<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .widget {
    width: 600px;
    height: 150px;
    border: 1px solid black;
    /* Simulate the widget wrapper */
  }
</style>
</head>
<body>
  <div class="widget">
    <!-- Container -->
    <div class="w-full h-full flex flex-wrap content-stretch items-stretch justify-center" style="gap: 2cqmin;">

      <!-- Token -->
      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 5)); line-height: 1; white-space: pre;">Hello</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 5)); line-height: 1; white-space: pre;">World</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 4)); line-height: 1; white-space: pre;">This</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 2)); line-height: 1; white-space: pre;">Is</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 1)); line-height: 1; white-space: pre;">A</span>
      </button>

      <button class="flex items-center justify-center relative cursor-grab shadow-sm transition-colors select-none bg-white text-slate-800 border-slate-200 border"
              style="flex: 1 1 auto; container-type: size; min-width: 0; min-height: 0; border-radius: 8px;">
        <span style="font-size: min(80cqh, calc(140cqw / 4)); line-height: 1; white-space: pre;">Test</span>
      </button>

    </div>
  </div>
</body>
</html>
